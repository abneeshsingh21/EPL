<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPL - Interactive Playground</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CodeMirror (Editor) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <!-- Pyodide (Python WebAssembly) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #3f3f46;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent: #ff4500;
            --accent-hover: #ff571a;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Grid background for technical feel */
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: -1px -1px;
        }

        /* BRUTALIST NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            height: 60px;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            border-right: 2px solid var(--border);
            text-transform: uppercase;
            letter-spacing: -1px;
            background: var(--surface);
        }
        
        .logo span {
            color: var(--accent);
            margin-right: 8px;
        }

        .controls {
            display: flex;
            align-items: stretch;
        }

        .status-box {
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            border-left: 2px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 600;
            background: var(--bg);
        }

        .btn-run {
            background: var(--accent);
            color: #000;
            border: none;
            border-left: 2px solid var(--border);
            padding: 0 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-run:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: -4px 4px 0px rgba(255, 69, 0, 0.3);
        }

        .btn-run:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-run:disabled {
            background: var(--surface);
            color: var(--text-dim);
            cursor: not-allowed;
        }

        /* 60/40 SPLIT WORKSPACE */
        .workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .panel {
            background: var(--surface);
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }
        
        .panel:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.6);
            border-color: #52525b;
        }

        .editor-container {
            flex: 6;
        }

        .output-container {
            flex: 4;
        }

        .panel-header {
            padding: 0.75rem 1.25rem;
            background: var(--border);
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CODEMIRROR OVERRIDES */
        .CodeMirror {
            flex: 1;
            height: 100% !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            background-color: var(--surface) !important;
            padding-top: 10px;
        }
        .CodeMirror-gutters {
            background-color: var(--surface) !important;
            border-right: 1px solid var(--border) !important;
        }

        /* TERMINAL */
        .terminal {
            flex: 1;
            background: #000;
            color: #d4d4d8;
            padding: 1.5rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.5;
        }

        .system-msg { color: var(--accent); }
        .error-msg { color: var(--error); }
        .success-msg { color: var(--success); }

        /* ANIMATIONS */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* CHATBOT UI */
        .chatbot-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 69, 0, 0.4);
            border: 2px solid #000;
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chatbot-fab:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .chatbot-window {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            width: 380px;
            height: 500px;
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(12px);
            border: 2px solid var(--border);
            box-shadow: -10px 10px 0px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .chatbot-window.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .chat-header {
            padding: 1rem 1.25rem;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .chat-header i {
            color: var(--accent);
            margin-right: 8px;
        }

        .close-chat {
            cursor: pointer;
            color: var(--text-dim);
            transition: color 0.2s;
        }
        .close-chat:hover { color: var(--error); }

        .chat-body {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-msg {
            max-width: 85%;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
            font-family: 'Inter', sans-serif;
        }

        .chat-msg pre {
            background: #000;
            padding: 0.75rem;
            border: 1px solid var(--border);
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: auto;
            font-size: 0.8rem;
            color: #eab308;
            border-left: 2px solid var(--accent);
        }

        .chat-msg.bot {
            background: var(--surface);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .chat-msg.user {
            background: #27272a;
            color: #fff;
            align-self: flex-end;
            border: 1px solid var(--border);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 2px solid var(--border);
            background: #000;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .chat-input:focus {
            border-color: var(--accent);
        }

        .chat-send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .chat-send-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <span>&#9632;</span> EPL Playground
        </a>
        <div class="controls">
            <div id="status-text" class="status-box">
                <i class="fa-solid fa-circle-notch spinner" style="margin-right:8px; color: var(--accent);"></i> Booting Engine
            </div>
            <button id="run-btn" class="btn-run" disabled onclick="runCode()">
                <i class="fa-solid fa-play"></i> Execute
            </button>
        </div>
    </nav>

    <div class="workspace">
        <div class="panel editor-container">
            <div class="panel-header">
                <span><i class="fa-solid fa-code"></i> INPUT.EPL</span>
                <span style="color:var(--text-dim); font-size:0.7rem">v7.4.1</span>
            </div>
            <textarea id="code-editor">Note: Welcome to the EPL Interactive Playground!
Note: This runs a full compiled interpreter directly in your browser.

name = "Developer"
Say "Hello, " + name + "!"

Repeat 3 times
    Say "Looping..."
End

Function greet takes person
    Return "Nice to meet you, " + person
End

Say greet("Abneesh")
</textarea>
        </div>
        
        <div class="panel output-container">
            <div class="panel-header">
                <span><i class="fa-solid fa-terminal"></i> OUTPUT</span>
                <i class="fa-solid fa-trash" style="cursor:pointer; color:var(--text-dim);" onclick="clearTerminal()" title="Clear"></i>
            </div>
            <div id="terminal" class="terminal"><span class="system-msg">> Downloading LLVM/WASM boundaries. Please wait ~10s...</span><br></div>
        </div>
    </div>

    <!-- CHATBOT WIDGET -->
    <div class="chatbot-fab" id="chatbot-fab" onclick="toggleChat()" title="Ask AI Assistant">
        <i class="fa-solid fa-robot"></i>
    </div>

    <div class="chatbot-window" id="chatbot-window">
        <div class="chat-header">
            <div><i class="fa-solid fa-robot"></i> EPL Assistant</div>
            <i class="fa-solid fa-xmark close-chat" onclick="toggleChat()"></i>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="chat-msg bot">
                System Initialized. I am the EPL Code Assistant. How can I help you write English Programming Language today? ⚡
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="Ask about macros, routing, loops..." onkeypress="handleChatEnter(event)">
            <button class="chat-send-btn" onclick="sendChatMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Initialize CodeMirror Editor
        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python", // EPL is close enough visually to python for the highlighter
            theme: "monokai",
            lineNumbers: true,
            indentUnit: 4,
            matchBrackets: true,
            viewportMargin: Infinity
        });

        // Terminal Helper
        const terminal = document.getElementById("terminal");
        function printToTerminal(text, type='normal') {
            const span = document.createElement('span');
            if(type === 'error') span.className = 'error-msg';
            if(type === 'system') span.className = 'system-msg';
            if(type === 'success') span.className = 'success-msg';
            span.innerText = text + '\n';
            terminal.appendChild(span);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            terminal.innerHTML = '';
        }

        // Pyodide Instance
        let pyodideReady = false;
        let pyodide = null;

        async function initEngine() {
            try {
                // 1. Load Pyodide
                pyodide = await loadPyodide();
                
                // 2. Install required Pyodide packages
                await pyodide.loadPackage("micropip");
                await pyodide.loadPackage("sqlite3");
                await pyodide.loadPackage("ssl");
                const micropip = pyodide.pyimport("micropip");
                
                printToTerminal("> Installing standard EPL Compiler (v7.4.1)...", "system");
                
                // 3. Install EPL from PyPI
                await micropip.install("eplang");
                
                printToTerminal("> Kernel Initialized. System Ready.", "success");
                printToTerminal("--------------------------------------------------\n");
                
                document.getElementById('status-text').innerHTML = '<i class="fa-solid fa-check" style="color:var(--success); margin-right:8px;"></i> Runtime Online';
                document.getElementById('run-btn').disabled = false;
                pyodideReady = true;

            } catch (err) {
                printToTerminal(`> KERNEL PANIC: ${err}`, "error");
                document.getElementById('status-text').innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:var(--error); margin-right:8px;"></i> System Offline';
            }
        }

        async function runCode() {
            if(!pyodideReady) return;
            
            clearTerminal();
            const eplCode = editor.getValue();
            
            // Core EPL Python Execution Bridge
            const pythonRunner = `
import sys
import io

# Monkeypatch to avoid old PyPI parser import bugs
if "epl.type_system" not in sys.modules:
    import types
    sys.modules["epl.type_system"] = types.ModuleType("epl.type_system")
sys.modules["epl.type_system"].EPLTypeChecker = None

from epl.cli import _parse_epl_program
from epl.interpreter import Interpreter
import builtins
import js

# Redirect inputs to browser prompt
def browser_input(prompt_text=""):
    res = js.prompt(prompt_text)
    return str(res) if res is not None else ""
builtins.input = browser_input

class MockStdin:
    def readline(self, *args):
        return browser_input() + "\\n"
    def read(self, *args):
        return browser_input() + "\\n"
sys.stdin = MockStdin()

# Redirect stdout to capture "Say" outputs
stdout = io.StringIO()
old_stdout = sys.stdout
sys.stdout = stdout

output_res = ""
try:
    code = """${eplCode.replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"""
    
    program = _parse_epl_program(code, "playground.epl")
    
    interpreter = Interpreter(safe_mode=True)
    interpreter.execute(program)
    
    output_res = stdout.getvalue()
except Exception as e:
    output_res = "ERROR: " + str(e)
finally:
    sys.stdout = old_stdout

output_res
`;

            try {
                printToTerminal(`> Executing [${new Date().toLocaleTimeString()}]...`, "system");
                const result = await pyodide.runPythonAsync(pythonRunner);
                
                if(result && typeof result === 'string' && result.startsWith("ERROR:")) {
                    printToTerminal(result, "error");
                } else if (result) {
                    printToTerminal(result);
                } else {
                    printToTerminal("[Program exited with code 0]", "system");
                }
            } catch (err) {
                printToTerminal(`FATAL ERROR:\n${err}`, "error");
            }
        }

        // Start booting engine on page load
        initEngine();

        // CHATBOT LOGIC
        const chatWindow = document.getElementById('chatbot-window');
        const chatBody = document.getElementById('chat-body');
        const chatInput = document.getElementById('chat-input');

        function toggleChat() {
            chatWindow.classList.toggle('active');
            if(chatWindow.classList.contains('active')) {
                chatInput.focus();
            }
        }

        function handleChatEnter(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg ${sender}`;
            msgDiv.innerHTML = text; // allow bold/pre HTML
            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function sendChatMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            
            // 1. Show User message
            appendMessage(text, 'user');
            chatInput.value = '';

            // 2. Simulated AI delay
            const typingId = "typing-" + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg bot`;
            msgDiv.id = typingId;
            msgDiv.innerHTML = '<i class="fa-solid fa-circle-notch spinner"></i> Thinking...';
            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight;

            setTimeout(() => {
                const typingEl = document.getElementById(typingId);
                if(typingEl) typingEl.remove();
                
                generateBotResponse(text.toLowerCase());
            }, 800 + Math.random() * 600);
        }

        function generateBotResponse(q) {
            // Hardcoded EPL Intelligence Tree
            if (q.includes("loop") || q.includes("repeat") || q.includes("iterate")) {
                appendMessage("In EPL, you don't need `for` or `while` statements. Use `Repeat` instead:<pre>Repeat 5 times\n    Say \"Hello World\"\nEnd</pre>", 'bot');
            } else if (q.includes("function") || q.includes("method") || q.includes("def ")) {
                appendMessage("Functions in EPL read like English paragraphs. Define them using `Function ... takes ...`:<pre>Function multiply takes a, b\n    Return a * b\nEnd</pre>", 'bot');
            } else if (q.includes("variable") || q.includes("declare") || q.includes("set ")) {
                appendMessage("You declare variables fluidly without strict type annotations using `Set`:<pre>Set name to \"EPL\"\nSet count to 42</pre>", 'bot');
            } else if (q.includes("hi") || q.includes("hello") || q.includes("hey")) {
                appendMessage("Hello! I'm here to help you write EPL logic. Try asking me how to read files, create routes, or write loops!", 'bot');
            } else if (q.includes("error") || q.includes("bug") || q.includes("panic")) {
                appendMessage("Make sure your indentation is correct and you close blocks with the <code>End</code> keyword.<br><br>The interpreter in the output window will highlight Syntax Errors pointing to the exact line.", 'bot');
            } else if (q.includes("server") || q.includes("web") || q.includes("api") || q.includes("route")) {
                appendMessage("EPL has an embedded ASGI server for writing web routes directly! Example:<pre>Start server on port 3000\n    Route \"/api\" responds with\n        Send JSON { \"status\": \"ok\" }\n    End\nEnd</pre>", 'bot');
            } else {
                appendMessage("I am the EPL syntax simulation bot currently functioning without an active LLM pipeline. However, I can help you with specific syntax examples. Try asking about **loops**, **variables**, **web servers**, or **functions**! 🤖", 'bot');
            }
        }
    </script>
</body>
</html>
